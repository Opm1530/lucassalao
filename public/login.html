<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Agendamento</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 2.4rem;
      line-height: 1;
    }

    .logo-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-top: 8px;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 0.78rem;
      color: #666;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input:focus {
      border-color: #555;
    }

    button {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: #3a1a1a;
      border: 1px solid #6b2222;
      border-radius: 8px;
      color: #f08080;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-top: 14px;
      display: none;
      text-align: center;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">✂️</div>
      <div class="logo-name">Lais</div>
      <div class="logo-sub">Studio Lucas Rocha — Dashboard</div>
    </div>

    <form id="loginForm">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" autocomplete="username" placeholder="admin" required />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required />

      <button type="submit" id="btn">Entrar</button>
    </form>

    <div class="error" id="errorMsg">Usuário ou senha incorretos.</div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('errorMsg');
      err.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      } catch {
        err.textContent = 'Erro de conexão. Tente novamente.';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
